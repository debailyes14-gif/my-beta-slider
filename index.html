<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Slider</title>
<style>
  :root {
    --bg:#0a0a12;
    --bg2:#050508;
    --accent:#0ff;
    --accent2:#ff0096;
    --glow1: rgba(0,255,255,0.35);
    --glow2: rgba(255,0,150,0.25);
    --glow3: rgba(0,255,255,0.12);
    --border: rgba(0,255,255,0.25);
    --dot-off: rgba(255,255,255,0.4);
    --pattern-opacity: 0.06;
  }
  [data-theme="inferno"] {
    --bg:#1a0505;
    --bg2:#0a0202;
    --accent:#ff4d1a;
    --accent2:#ffd400;
    --glow1: rgba(255,60,0,0.45);
    --glow2: rgba(255,212,0,0.25);
    --glow3: rgba(255,0,0,0.15);
    --border: rgba(255,77,26,0.3);
    --dot-off: rgba(255,255,255,0.4);
  }
  [data-theme="matrix"] {
    --bg:#020a02;
    --bg2:#010401;
    --accent:#00ff66;
    --accent2:#0a5c2b;
    --glow1: rgba(0,255,102,0.4);
    --glow2: rgba(10,150,60,0.25);
    --glow3: rgba(0,255,102,0.1);
    --border: rgba(0,255,102,0.3);
    --dot-off: rgba(255,255,255,0.35);
  }
  [data-theme="royal"] {
    --bg:#10081f;
    --bg2:#07040f;
    --accent:#b06bff;
    --accent2:#ffd166;
    --glow1: rgba(176,107,255,0.4);
    --glow2: rgba(255,209,102,0.22);
    --glow3: rgba(120,60,255,0.15);
    --border: rgba(176,107,255,0.3);
    --dot-off: rgba(255,255,255,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:linear-gradient(180deg, var(--bg), var(--bg2));
    transition: background 0.6s ease;
  }
  body {
    min-height:100vh;
    font-family: 'Segoe UI', sans-serif;
    color:#eee;
    position:relative;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
  }
  .bg-glow {
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 15% 15%, var(--glow1), transparent 35%),
      radial-gradient(circle at 85% 25%, var(--glow2), transparent 40%),
      radial-gradient(circle at 50% 90%, var(--glow3), transparent 45%),
      radial-gradient(circle at 85% 85%, var(--glow2), transparent 40%);
    transition: background 0.6s ease;
  }
  .bg-lines {
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    opacity:0.5;
    background-image: repeating-linear-gradient(115deg, var(--border) 0px, var(--border) 1px, transparent 1px, transparent 90px);
    transition: background-image 0.6s ease;
  }
  header {
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 30px;
  }
  header .logo {
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    color:var(--accent);
    text-shadow:0 0 12px var(--glow1);
    transition:0.4s;
  }
  nav { display:flex; gap:22px; }
  nav a {
    color:#ccc;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
  }
  nav a:hover { color:var(--accent); }
  .upload-btn {
    color:var(--accent);
    border:1px solid var(--accent);
    background:rgba(0,0,0,0.3);
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    transition:0.3s;
    white-space:nowrap;
  }
  .upload-btn:hover { background:var(--accent); color:#000; }

  .flag-section {
    margin-top:50px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .flag-btn {
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#000;
    border:none;
    padding:12px 30px;
    border-radius:30px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:transform 0.2s, box-shadow 0.3s;
    box-shadow:0 0 20px var(--glow1);
  }
  .flag-btn:hover { transform:scale(1.05); }
  .flag-btn:active { transform:scale(0.95); }
  .btns-row {
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .worldcup-btn {
    background:linear-gradient(135deg, #ffd700, #ff8c00);
    color:#1a1200;
    box-shadow:0 0 20px rgba(255,215,0,0.5);
  }

  .worldcup-overlay {
    position:fixed;
    inset:0;
    z-index:70;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    opacity:0;
  }
  .worldcup-overlay.show { opacity:1; }

  .screen-flash {
    position:fixed;
    inset:0;
    z-index:65;
    background: radial-gradient(circle, rgba(255,215,0,0.55), transparent 65%);
    opacity:0;
    pointer-events:none;
  }
  .screen-flash.flash { animation: flashOut 0.7s ease forwards; }
  @keyframes flashOut {
    0% { opacity:1; }
    100% { opacity:0; }
  }

  .rays {
    position:absolute;
    width:900px;
    height:900px;
    background: conic-gradient(from 0deg,
      rgba(255,215,0,0.25) 0deg, transparent 20deg,
      rgba(255,215,0,0.25) 40deg, transparent 60deg,
      rgba(255,215,0,0.25) 80deg, transparent 100deg,
      rgba(255,215,0,0.25) 120deg, transparent 140deg,
      rgba(255,215,0,0.25) 160deg, transparent 180deg,
      rgba(255,215,0,0.25) 200deg, transparent 220deg,
      rgba(255,215,0,0.25) 240deg, transparent 260deg,
      rgba(255,215,0,0.25) 280deg, transparent 300deg,
      rgba(255,215,0,0.25) 320deg, transparent 340deg,
      rgba(255,215,0,0.25) 360deg);
    border-radius:50%;
    opacity:0;
  }
  .rays.spin { animation: raysSpin 1.6s ease-out forwards; }
  @keyframes raysSpin {
    0% { transform: rotate(0deg) scale(0.3); opacity:0; }
    30% { opacity:1; }
    100% { transform: rotate(220deg) scale(1.4); opacity:0; }
  }

  .trophy-logo {
    position:relative;
    width:170px;
    height:170px;
    z-index:2;
    filter:drop-shadow(0 0 35px rgba(255,215,0,0.85));
    opacity:0;
  }
  .trophy-logo.pop {
    animation: logoBurst 1.6s cubic-bezier(.2,.9,.3,1.2) forwards;
  }
  @keyframes logoBurst {
    0% { transform: scale(0) rotate(-30deg); opacity:0; }
    35% { transform: scale(1.35) rotate(10deg); opacity:1; }
    55% { transform: scale(0.95) rotate(-4deg); opacity:1; }
    75% { transform: scale(1.05) rotate(0deg); opacity:1; }
    100% { transform: scale(1) rotate(0deg); opacity:0; }
  }

  .shake { animation: pageShake 0.5s ease; }
  @keyframes pageShake {
    0%, 100% { transform: translate(0,0); }
    20% { transform: translate(-6px, 4px); }
    40% { transform: translate(6px, -4px); }
    60% { transform: translate(-4px, -3px); }
    80% { transform: translate(4px, 3px); }
  }

  .converge-piece {
    position:fixed;
    top:50%;
    left:50%;
    z-index:66;
    border-radius:2px;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
    will-change: transform, opacity;
    animation-name: convergeIn;
    animation-timing-function: cubic-bezier(.5,0,.2,1);
    animation-fill-mode: forwards;
  }
  @keyframes convergeIn {
    0% { transform: translate(-50%, -50%) translate(var(--sx), var(--sy)) rotate(var(--srot)) scale(1); opacity:1; }
    75% { opacity:1; }
    100% { transform: translate(-50%, -50%) translate(0,0) rotate(0deg) scale(0.15); opacity:0; }
  }

  .burst-piece {
    position:fixed;
    top:50%;
    left:50%;
    z-index:66;
    will-change: transform, opacity;
    animation-name: burstOut;
    animation-timing-function: cubic-bezier(.15,.7,.3,1);
    animation-fill-mode: forwards;
  }
  @keyframes burstOut {
    0% { transform: translate(-50%, -50%) translate(0,0) rotate(0deg) scale(1); opacity:1; }
    100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.4); opacity:0; }
  }

  .flag-rain-box {
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
    z-index:60;
  }
  .falling-flag {
    position:absolute;
    top:-60px;
    border-radius:3px;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
    will-change: transform;
    animation-name: fallDown;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    pointer-events:none;
  }
  @keyframes fallDown {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(110vh) rotate(25deg); opacity:0.9; }
  }
  main {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:2;
    padding:40px 0 90px;
  }
  main h1 {
    color:#fff;
    font-size:28px;
    margin-bottom:6px;
    text-align:center;
  }
  main p.sub {
    color:#999;
    font-size:14px;
    margin-bottom:35px;
    text-align:center;
  }
  footer {
    position:relative;
    z-index:2;
    text-align:center;
    padding:16px;
    font-size:12px;
    color:#666;
  }
  .slider {
    position:relative;
    width:95%;
    max-width:900px;
    height:450px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .track {
    position:relative;
    width:100%;
    height:100%;
  }
  .slide {
    position:absolute;
    top:50%;
    left:50%;
    width:500px;
    height:340px;
    border-radius:16px;
    overflow:hidden;
    box-shadow: 0 0 30px var(--glow1), 0 0 12px var(--glow2);
    border:1px solid var(--border);
    transition: transform 0.55s cubic-bezier(.25,.8,.25,1), opacity 0.55s ease, filter 0.55s ease, z-index 0s, box-shadow 0.4s ease, border 0.4s ease;
    background:#000;
    cursor:pointer;
  }
  .slide img {
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
    pointer-events:none;
  }
  .btn {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:var(--accent);
    border:1px solid var(--accent);
    font-size:22px;
    width:44px;
    height:44px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
    z-index:50;
  }
  .btn:hover { background:var(--accent); color:#000; }
  .prev { right:15px; }
  .next { left:15px; }
  .dots {
    position:absolute;
    bottom:-35px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:8px;
  }
  .dot {
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--dot-off);
    cursor:pointer;
    transition:0.3s;
  }
  .dot.active { background:var(--accent); box-shadow:0 0 8px var(--accent); }

  .themes {
    position:fixed;
    top:75px;
    left:20px;
    display:flex;
    gap:10px;
    z-index:100;
  }
  .theme-btn {
    width:26px;
    height:26px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid rgba(255,255,255,0.3);
    transition:0.2s;
  }
  .theme-btn:hover, .theme-btn.active { border-color:#fff; transform:scale(1.15); }
  .theme-btn.t-cyberpunk { background: linear-gradient(135deg, #0ff, #ff0096); }
  .theme-btn.t-inferno { background: linear-gradient(135deg, #ff4d1a, #ffd400); }
  .theme-btn.t-matrix { background: linear-gradient(135deg, #00ff66, #0a5c2b); }
  .theme-btn.t-royal { background: linear-gradient(135deg, #b06bff, #ffd166); }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-lines"></div>
<div class="themes" id="themes"></div>

<header>
  <div class="logo">SITE</div>
  <div style="display:flex; align-items:center; gap:18px;">
    <nav>
      <a href="#">الرئيسية</a>
      <a href="#">مشاريعي</a>
      <a href="#">تواصل معايا</a>
    </nav>
    <label class="upload-btn" for="uploadInput">+ ارفع صورتك</label>
    <input type="file" id="uploadInput" accept="image/*" style="display:none;">
  </div>
</header>

<main>
  <h1>معرض الصور</h1>
  <p class="sub">مشاريعي ولحظاتي المفضلة</p>

  <div class="slider">
    <div class="track" id="track"></div>
    <div class="btn prev" onclick="move(1)">&lsaquo;</div>
    <div class="btn next" onclick="move(-1)">&rsaquo;</div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="flag-section">
    <div class="btns-row">
      <button class="flag-btn" id="flagBtn">🎲 امطر أعلام</button>
      <button class="flag-btn worldcup-btn" id="worldcupBtn">🏆 كأس العالم</button>
    </div>
  </div>
</main>

<div class="flag-rain-box" id="flagRainBox"></div>
<div class="screen-flash" id="screenFlash"></div>
<div class="worldcup-overlay" id="worldcupOverlay">
  <div class="rays" id="rays"></div>

  const total = () => images.length;
  const trackEl = document.getElementById('track');
  const dotsEl = document.getElementById('dots');
  let index = 0;

  function renderAll() {
    trackEl.innerHTML = '';
    dotsEl.innerHTML = '';
    images.forEach((src, i) => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.innerHTML = `<img src="${src}">`;
      div.onclick = () => { if (i !== index) goTo(i); };
      trackEl.appendChild(div);
      dotsEl.innerHTML += `<div class="dot ${i===index?'active':''}" onclick="goTo(${i})"></div>`;
    });
    update();
  }

  function update() {
    const t = total();
    const slideEls = document.querySelectorAll('.slide');
    slideEls.forEach((el, i) => {
      let offset = i - index;
      if (offset > t / 2) offset -= t;
      if (offset < -t / 2) offset += t;

      let x, scale, opacity, z, blur;
      if (offset === 0) {
        x = 0; scale = 1; opacity = 1; z = 10; blur = 0;
      } else if (offset === 1 || offset === -1) {
        x = offset * 320;
        scale = 0.6;
        opacity = 0.55;
        z = 5;
        blur = 1;
      } else {
        x = offset * 320;
        scale = 0.4;
        opacity = 0;
        z = 1;
        blur = 2;
      }
      el.style.transform = `translate(-50%, -50%) translateX(${x}px) scale(${scale})`;
      el.style.opacity = opacity;
      el.style.zIndex = z;
      el.style.filter = `blur(${blur}px)`;
    });
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === index));
  }

  function move(dir) {
    const t = total();
    index = (index - dir + t) % t;
    update();
  }

  function goTo(i) {
    index = i;
    update();
  }

  renderAll();
  let autoplay = setInterval(() => move(-1), 4000);

  // Upload feature: let a person add their own photo to the slider
  const uploadInput = document.getElementById('uploadInput');
  uploadInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      images.push(ev.target.result);
      renderAll();
      index = images.length - 1;
      update();
    };
    reader.readAsDataURL(file);
    uploadInput.value = '';
  });

  // Themes

  const themesEl = document.getElementById('themes');

    const b = document.createElement('div');
    b.className = `theme-btn t-${t.id} ${i===0?'active':''}`;
    b.title = t.name;
    b.onclick = () => setTheme(t.id, b);
    themesEl.appendChild(b);
  });

  function setTheme(id, btnEl) {
    if (id === 'cyberpunk') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', id);
    }
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
  }

  const flagBtn = document.getElementById('flagBtn');
  const flagRainBox = document.getElementById('flagRainBox');

  function spawnFallingFlag() {
    const country = countries[Math.floor(Math.random() * countries.length)];
    const el = document.createElement('img');
    el.className = 'falling-flag';
    el.src = country.img;
    el.alt = country.name;

    const width = 30 + Math.random() * 30; // 30px - 60px
    const left = Math.random() * 92; // %
    const duration = 2.5 + Math.random() * 2.5; // 2.5s - 5s
    const delay = Math.random() * 1.2;

    el.style.width = width + 'px';
    el.style.left = left + '%';
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';

    flagRainBox.appendChild(el);

    setTimeout(() => el.remove(), (duration + delay) * 1000 + 100);
  }

  flagBtn.addEventListener('click', () => {
    for (let i = 0; i < 25; i++) {
      spawnFallingFlag();
    }
  });

  // World Cup celebration effect — a completely different style from the flag rain:
  // instead of falling from the top, everything BURSTS OUTWARD from the center.
  const worldcupBtn = document.getElementById('worldcupBtn');
  const worldcupOverlay = document.getElementById('worldcupOverlay');
  const trophyPop = document.getElementById('trophyPop');
  const raysEl = document.getElementById('rays');
  const screenFlash = document.getElementById('screenFlash');
  const burstColors = ['#ffd700', '#ff8c00', '#00ff66', '#0ff', '#ff0096', '#fff'];

  function spawnBurstPiece() {
    const el = document.createElement('div');
    el.className = 'burst-piece';
    const size = 6 + Math.random() * 10;
    el.style.width = size + 'px';
    el.style.height = (size * (0.6 + Math.random() * 0.8)) + 'px';
    el.style.background = burstColors[Math.floor(Math.random() * burstColors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';

    // random direction & distance outward from center
    const angle = Math.random() * Math.PI * 2;
    const distance = 250 + Math.random() * 500;
    const tx = Math.cos(angle) * distance;
    const ty = Math.sin(angle) * distance;
    const rot = 360 + Math.random() * 720;

    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.setProperty('--rot', rot + 'deg');

    const duration = 1 + Math.random() * 0.8;
    el.style.animationDuration = duration + 's';

    document.body.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000 + 100);
  }

  function spawnConvergePiece() {
    const country = countries[Math.floor(Math.random() * countries.length)];
    const el = document.createElement('img');
    el.className = 'converge-piece';
    el.src = country.img;

    const w = 22 + Math.random() * 20;
    el.style.width = w + 'px';
    el.style.height = (w * 0.72) + 'px';

    // start from a random point around the edges of the screen
    const angle = Math.random() * Math.PI * 2;
    const distance = 280 + Math.random() * 420;
    const sx = Math.cos(angle) * distance;
    const sy = Math.sin(angle) * distance;
    const srot = (Math.random() - 0.5) * 720;

    el.style.setProperty('--sx', sx + 'px');
    el.style.setProperty('--sy', sy + 'px');
    el.style.setProperty('--srot', srot + 'deg');

    const duration = 0.7 + Math.random() * 0.5;
    el.style.animationDuration = duration + 's';

    document.body.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000 + 50);
  }

  worldcupBtn.addEventListener('click', () => {
    // PHASE 1: flags converge from all over the screen toward the center,
    // gathering into the FIFA logo
    for (let i = 0; i < 45; i++) {
      spawnConvergePiece();
    }

    // subtle glow builds up as the flags gather
    raysEl.classList.remove('spin');
    void raysEl.offsetWidth;
    raysEl.classList.add('spin');

    // PHASE 2: once the flags finish converging, the logo bursts apart
    setTimeout(() => {
      // Screen flash
      screenFlash.classList.remove('flash');
      void screenFlash.offsetWidth;
      screenFlash.classList.add('flash');

      // Real FIFA logo pops at the exact moment the flags arrive
      trophyPop.classList.remove('pop');
      void trophyPop.offsetWidth;
      trophyPop.classList.add('pop');
      worldcupOverlay.classList.add('show');
      setTimeout(() => worldcupOverlay.classList.remove('show'), 1600);

      // Whole page shake
      document.body.classList.remove('shake');
      void document.body.offsetWidth;
      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), 500);

      // Explosion outward from the center
      for (let i = 0; i < 70; i++) {
        spawnBurstPiece();
      }
    }, 950);
  });
</script>
